<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="scene">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#204144"/>
      <stop offset="55%" stop-color="#3f655a"/>
      <stop offset="100%" stop-color="#385255"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0%" stop-color="#f2fff7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f2fff7" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="49" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.7  0 0 0 0 0.9  0 0 0 0 0.82  0 0 0 0.09 0"/>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="1" fill="#d5efe2" fill-opacity="0.055"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" filter="url(#noise)" opacity="0.7"/>
  <rect width="1600" height="900" fill="url(#scan)"/>
  <ellipse cx="360" cy="190" rx="560" ry="310" fill="url(#halo)"/>

  <g opacity="0.38" fill="#bde8d4" filter="url(#blur)">
    <ellipse cx="290" cy="480" rx="260" ry="120"/>
    <ellipse cx="760" cy="430" rx="210" ry="90"/>
    <ellipse cx="1180" cy="500" rx="280" ry="120"/>
  </g>

  <g fill="none" stroke="#e0f4e8" stroke-opacity="0.26" stroke-width="2.6">
    <path d="M90 690C380 500 720 470 1040 570C1260 640 1430 750 1570 850"/>
    <path d="M170 760C530 580 910 580 1290 720"/>
    <circle cx="1170" cy="250" r="90"/>
    <circle cx="1170" cy="250" r="26"/>
  </g>

  <g fill="#f1fbf3" fill-opacity="0.2">
    <circle cx="260" cy="470" r="5"/><circle cx="470" cy="540" r="4"/><circle cx="690" cy="500" r="5"/>
    <circle cx="980" cy="545" r="4"/><circle cx="1260" cy="520" r="5"/>
  </g>

  <g fill="#e2f6ec" fill-opacity="0.2" stroke="#e4f7ee" stroke-opacity="0.3"><path d="M670 370L760 330L850 370L820 520H700Z"/><path d="M910 420L970 390L1030 420L1010 520H930Z"/></g>
